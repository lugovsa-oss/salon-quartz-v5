<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-labelledby="title desc">
<title id="title">The Salon of Questions seal</title>
<desc id="desc">Circular ex-libris seal with compass star and the words The Salon of Questions</desc>
<style>
  .navy{fill:#10243a}.paper{fill:#f6f1e5}.bronze{fill:#a77b42}.line{fill:none;stroke:#a77b42;stroke-width:5}.thin{fill:none;stroke:#f6f1e5;stroke-width:2;opacity:.85}.txt{font-family:Georgia,'Times New Roman',serif;letter-spacing:7px;fill:#f6f1e5}.small{font-size:24px;letter-spacing:3px}.mid{font-size:30px}.tiny{font-size:17px;letter-spacing:2px}
</style>
<circle cx="210" cy="210" r="200" class="navy"/>
<circle cx="210" cy="210" r="188" class="line"/>
<circle cx="210" cy="210" r="137" class="thin"/>
<circle cx="210" cy="210" r="112" fill="none" stroke="#a77b42" stroke-width="3"/>
<path id="topArc" d="M70,210a140,140 0 0 1 280,0" fill="none"/>
<path id="botArc" d="M350,210a140,140 0 0 1 -280,0" fill="none"/>
<text class="txt mid"><textPath href="#topArc" startOffset="50%" text-anchor="middle">THE SALON</textPath></text>
<text class="txt mid"><textPath href="#botArc" startOffset="50%" text-anchor="middle">OF QUESTIONS</textPath></text>
<g transform="translate(210 155)">
  <path d="M0,-62 L13,-13 L62,0 L13,13 L0,62 L-13,13 L-62,0 L-13,-13 Z" fill="#a77b42"/>
  <path d="M0,-42 L8,-8 L42,0 L8,8 L0,42 L-8,8 L-42,0 L-8,-8 Z" fill="#10243a" stroke="#f6f1e5" stroke-width="2"/>
  <circle r="7" fill="#f6f1e5"/>
</g>
<text x="210" y="230" text-anchor="middle" class="txt small">COMPANIONS</text>
<text x="210" y="263" text-anchor="middle" class="txt tiny">OF</text>
<text x="210" y="292" text-anchor="middle" class="txt small">INQUIRY</text>
<text x="103" y="215" text-anchor="middle" class="txt mid">+</text>
<text x="317" y="215" text-anchor="middle" class="txt mid">+</text>
</svg>
